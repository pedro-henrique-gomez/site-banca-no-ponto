let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let buscaAtual = "";
let categoriaAtual = "todos";

/* RENDER */
function render(){
  let html = "";

  let filtrados = produtos.filter(p =>
    (categoriaAtual==="todos" || p.categoria===categoriaAtual) &&
    p.nome.toLowerCase().includes(buscaAtual.toLowerCase())
  );

  if(filtrados.length === 0){
    html = "<p>Nenhum produto encontrado</p>";
  }

  filtrados.forEach(p=>{
    let item = carrinho.find(i=>i.nome===p.nome);

    html += `
    <div class="produto">
      <img src="${p.img}">
      <h3>${p.nome}</h3>
      <p>R$ ${p.preco}</p>

      <div class="controle-card">
        <button onclick="menosCard('${p.nome}')">-</button>
        <span>${item ? item.qtd : 0}</span>
        <button onclick="add('${p.nome}',${p.preco})">+</button>
      </div>
    </div>
    `;
  });

  document.getElementById("produtos").innerHTML = html;
  atualizar();
}

/* BUSCA */
function buscar(valor){
  buscaAtual = valor;
  render();
}

/* FILTRO */
function filtrar(cat){
  categoriaAtual = cat;
  render();
}

/* ADD */
function add(nome,preco){
  let item = carrinho.find(i=>i.nome===nome);

  if(item){
    item.qtd++;
  }else{
    carrinho.push({nome,preco,qtd:1});
  }

  salvar();
  render();
}

/* REMOVER */
function menosCard(nome){
  let item = carrinho.find(i=>i.nome===nome);
  if(!item) return;

  item.qtd--;
  if(item.qtd<=0){
    carrinho = carrinho.filter(i=>i.nome!==nome);
  }

  salvar();
  render();
}

/* ATUALIZAR CARRINHO */
function atualizar(){
  let html="";
  let total=0;
  let qtdTotal=0;

  carrinho.forEach((i,index)=>{
    total += i.preco*i.qtd;
    qtdTotal += i.qtd;

    html += `
    <div class="item">
      <strong>${i.nome}</strong>
      <div class="controls">
        <button onclick="menos(${index})">-</button>
        <span>${i.qtd}</span>
        <button onclick="mais(${index})">+</button>
      </div>
    </div>
    `;
  });

  document.getElementById("itens").innerHTML = html;
  document.getElementById("total").innerHTML = "Total: R$ "+total.toFixed(2);
  document.getElementById("contador").innerText = qtdTotal;
}

/* CONTROLES */
function mais(i){
  carrinho[i].qtd++;
  salvar(); render();
}

function menos(i){
  carrinho[i].qtd--;
  if(carrinho[i].qtd<=0) carrinho.splice(i,1);
  salvar(); render();
}

/* SALVAR */
function salvar(){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

/* TOGGLE */
function toggle(){
  document.getElementById("carrinho").classList.toggle("active");
  document.querySelector(".overlay").classList.toggle("active");
}

/* ENVIAR */
function enviar(){
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;

  if(!nome || !endereco){
    alert("Preencha nome e endereço!");
    return;
  }

  let msg = "Pedido:%0A";

  carrinho.forEach(i=>{
    msg += `- ${i.nome} x${i.qtd}%0A`;
  });

  let total = carrinho.reduce((s,i)=>s+(i.preco*i.qtd),0);

  msg += `%0ATotal: R$${total}`;
  msg += `%0A%0ANome: ${nome}`;
  msg += `%0AEndereço: ${endereco}`;

  window.open(`https://wa.me/5599999999999?text=${msg}`);
}
